# Build CodexStudy desktop installers on tag push or manual dispatch.
# Artifacts: Windows NSIS, macOS .dmg, Linux AppImage.
name: CodexStudy Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: codexstudy-release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 (NSIS)
            os: windows-latest
            bundle: nsis
            tauri_config: src-tauri/tauri.windows.conf.json
            artifact_glob: desktop/src-tauri/target/release/bundle/nsis/*
          - name: macOS (DMG)
            os: macos-latest
            bundle: dmg
            tauri_config: src-tauri/tauri.conf.json
            artifact_glob: desktop/src-tauri/target/release/bundle/dmg/*
          - name: Linux (AppImage)
            os: ubuntu-22.04
            bundle: appimage
            tauri_config: src-tauri/tauri.conf.json
            artifact_glob: desktop/src-tauri/target/release/bundle/appimage/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            codex-rs
            desktop/src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install workspace dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Doctor (Windows)
        if: runner.os == 'Windows'
        working-directory: desktop
        run: node scripts/doctor.mjs --strict

      - name: Doctor (Unix)
        if: runner.os != 'Windows'
        working-directory: desktop
        run: sh scripts/doctor.sh --strict

      - name: Prepare bundled Codex CLI
        working-directory: desktop
        run: corepack pnpm prepare:bundled-codex --release

      - name: Prepare bundled Computer Use
        working-directory: desktop
        run: corepack pnpm prepare:bundled-computer-use --release

      - name: Build Tauri bundle
        working-directory: desktop
        run: >
          corepack pnpm exec tauri build
          --bundles ${{ matrix.bundle }}
          --config ${{ matrix.tauri_config }}
        env:
          CI: true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexstudy-${{ matrix.bundle }}-${{ runner.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30
